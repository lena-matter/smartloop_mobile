function BinGauge({bin,size="normal"}){
  const ht=size==="small"?100:160,w=size==="small"?50:70;
  const fillH=(bin.fillPct/100)*(ht-20);

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>

function CircularProgress({value,max,size=120,strokeWidth=10,color=SL.green[500],children}){
  const r=(size-strokeWidth)/2,c=2*Math.PI*r,p=Math.min(value/max,1)*c;
  return(
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={SL.grey[100]} strokeWidth={strokeWidth}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={c} strokeDashoffset={c-p} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.5s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>{children}</div>
    </div>
  );
}

function StatusPill({label,color,bg}){

/* ═══ PURE SVG CHART ═══ */
function MiniChart({data,width=340,height=180}){
  const pad={t:10,r:10,b:30,l:35};
  const cw=width-pad.l-pad.r,ch=height-pad.t-pad.b;
  const minY=40,maxY=100;
  const x=i=>(i/(data.length-1))*cw+pad.l;
  const y=v=>pad.t+ch*(1-(v-minY)/(maxY-minY));
  const fillPath=data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d.fill).toFixed(1)}`).join(" ");
  const targetPath=data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d.target).toFixed(1)}`).join(" ");
  const areaPath=fillPath+` L${x(data.length-1).toFixed(1)},${y(minY).toFixed(1)} L${x(0).toFixed(1)},${y(minY).toFixed(1)} Z`;

  return(
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" style={{display:"block"}}>
      <defs>
        <linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={SL.green[500]} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={SL.green[500]} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {/* Grid lines */}
      {[40,60,80,100].map(v=>(
        <g key={v}>
          <line x1={pad.l} y1={y(v)} x2={width-pad.r} y2={y(v)} stroke={SL.grey[200]} strokeWidth="0.5"/>
          <text x={pad.l-6} y={y(v)+4} textAnchor="end" fontSize="9" fill={SL.grey[500]}>{v}%</text>
        </g>
      ))}
      {/* X labels */}
      {data.map((d,i)=>(i%2===0||i===data.length-1)&&(
        <text key={i} x={x(i)} y={height-8} textAnchor="middle" fontSize="9" fill={SL.grey[500]}>{d.week}</text>
      ))}
      {/* Area fill */}
      <path d={areaPath} fill="url(#areaG)"/>
      {/* Target line (dashed) */}
      <path d={targetPath} fill="none" stroke={SL.orange[400]} strokeWidth="2" strokeDasharray="6 4"/>
      {/* Fill line */}
      <path d={fillPath} fill="none" stroke={SL.green[500]} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {/* Data points */}
      {data.map((d,i)=>(
        <circle key={i} cx={x(i)} cy={y(d.fill)} r="3" fill={SL.white} stroke={SL.green[500]} strokeWidth="2"/>
      ))}
    </svg>
  );
}

/* ═══ FRIDGE MAGNET ═══ */

function FridgeMagnet({bins,onClose}){
  const[truckOn,setTruckOn]=useState(false);
  const[binDown,setBinDown]=useState(false);
  const[ci,setCi]=useState(0);
  const cc=[SL.green[500],SL.teal[500],SL.orange[500],SL.green[400],SL.teal[300]];
  useEffect(()=>{if(!truckOn)return;const id=setInterval(()=>setCi(c=>(c+1)%cc.length),500);return()=>clearInterval(id);},[truckOn]);
  const gen=bins.find(b=>b.id==="general")||bins[0];
  const isY=new Date().getDate()%2===0;
  const eyeC=binDown?SL.red[500]:truckOn?cc[ci]:isY?SL.yellow[500]:SL.green[500];
  const bc=truckOn?cc[ci]:"transparent";

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div style={{position:"relative",maxWidth:420,width:"90%"}}>
        <button onClick={onClose} style={{position:"absolute",top:-16,right:-16,zIndex:10,width:36,height:36,borderRadius:"50%",background:SL.white,border:"none",cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon name="x" size={18} color={SL.grey[700]}/>
        </button>
        <div style={{background:"linear-gradient(180deg,#E8EBF0,#D4D8E0)",borderRadius:20,padding:28,boxShadow:"inset 0 2px 4px rgba(255,255,255,0.5),0 20px 60px rgba(0,0,0,0.3)"}}>
          <div style={{textAlign:"center",marginBottom:14}}><span style={{fontSize:11,fontWeight:700,color:SL.grey[500],textTransform:"uppercase",letterSpacing:2}}>Ripple Fridge Magnet</span></div>
          <div style={{background:`linear-gradient(180deg,${SL.grey[700]},${SL.grey[800]})`,borderRadius:16,padding:"20px 20px 24px",position:"relative",overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.1)",border:`3px solid ${bc}`,transition:"border-color 0.3s"}}>
            <div style={{textAlign:"center",marginBottom:6}}><span style={{fontSize:10,fontWeight:700,color:SL.grey[300],letterSpacing:1.5,textTransform:"uppercase"}}>{isY?"Yellow Bin Week":"Green Bin Week"}</span></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{display:"flex",flexDirection:"column",gap:16,paddingLeft:4}}>
                {["Full","Med","Low"].map((lv,i)=>{
                  const th=[80,50,20],act=gen.fillPct>=th[i],co=[SL.red[500],SL.yellow[500],SL.green[500]];
                  return(<div key={lv} style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:16,height:16,borderRadius:"50%",background:act?co[i]:SL.grey[700],boxShadow:act?`0 0 14px ${co[i]}`:"none",border:`2px solid ${act?co[i]:SL.grey[500]}`,transition:"all 0.5s"}}/>
                    <span style={{fontSize:14,fontWeight:700,color:act?SL.white:SL.grey[500]}}>{lv}</span>
                  </div>);
                })}
              </div>
