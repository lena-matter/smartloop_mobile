function CircularProgress({value,max,size=120,strokeWidth=10,color=SL.green[500],children}){
  const r=(size-strokeWidth)/2,c=2*Math.PI*r,p=Math.min(value/max,1)*c;
  return(
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={SL.grey[100]} strokeWidth={strokeWidth}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={c} strokeDashoffset={c-p} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.5s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>{children}</div>
    </div>
  );
}

/* ═══ PURE SVG CHART ═══ */
function MiniChart({data,width=340,height=180}){
  const pad={t:10,r:10,b:30,l:35};
  const cw=width-pad.l-pad.r,ch=height-pad.t-pad.b;
  const minY=40,maxY=100;
  const x=i=>(i/(data.length-1))*cw+pad.l;
  const y=v=>pad.t+ch*(1-(v-minY)/(maxY-minY));
  const fillPath=data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d.fill).toFixed(1)}`).join(" ");
  const targetPath=data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d.target).toFixed(1)}`).join(" ");
  const areaPath=fillPath+` L${x(data.length-1).toFixed(1)},${y(minY).toFixed(1)} L${x(0).toFixed(1)},${y(minY).toFixed(1)} Z`;

  return(
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" style={{display:"block"}}>
      <defs>
        <linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={SL.green[500]} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={SL.green[500]} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {/* Grid lines */}
      {[40,60,80,100].map(v=>(
        <g key={v}>
          <line x1={pad.l} y1={y(v)} x2={width-pad.r} y2={y(v)} stroke={SL.grey[200]} strokeWidth="0.5"/>
          <text x={pad.l-6} y={y(v)+4} textAnchor="end" fontSize="9" fill={SL.grey[500]}>{v}%</text>
        </g>
      ))}
      {/* X labels */}
      {data.map((d,i)=>(i%2===0||i===data.length-1)&&(
        <text key={i} x={x(i)} y={height-8} textAnchor="middle" fontSize="9" fill={SL.grey[500]}>{d.week}</text>
      ))}
      {/* Area fill */}
      <path d={areaPath} fill="url(#areaG)"/>
      {/* Target line (dashed) */}
      <path d={targetPath} fill="none" stroke={SL.orange[400]} strokeWidth="2" strokeDasharray="6 4"/>
      {/* Fill line */}
      <path d={fillPath} fill="none" stroke={SL.green[500]} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {/* Data points */}
      {data.map((d,i)=>(
        <circle key={i} cx={x(i)} cy={y(d.fill)} r="3" fill={SL.white} stroke={SL.green[500]} strokeWidth="2"/>
      ))}
    </svg>
  );
}

function FridgeMagnet({bins,onClose}){

  const[binDown,setBinDown]=useState(false);
  const[ci,setCi]=useState(0);
  const cc=[SL.green[500],SL.teal[500],SL.orange[500],SL.green[400],SL.teal[300]];
  useEffect(()=>{if(!truckOn)return;const id=setInterval(()=>setCi(c=>(c+1)%cc.length),500);return()=>clearInterval(id);},[truckOn]);
  const gen=bins.find(b=>b.id==="general")||bins[0];
  const isY=new Date().getDate()%2===0;
  const eyeC=binDown?SL.red[500]:truckOn?cc[ci]:isY?SL.yellow[500]:SL.green[500];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>

          <Icon name="x" size={18} color={SL.grey[700]}/>
        </button>
        <div style={{background:"linear-gradient(180deg,#E8EBF0,#D4D8E0)",borderRadius:20,padding:28,boxShadow:"inset 0 2px 4px rgba(255,255,255,0.5),0 20px 60px rgba(0,0,0,0.3)"}}>
          <div style={{textAlign:"center",marginBottom:14}}><span style={{fontSize:11,fontWeight:700,color:SL.grey[500],textTransform:"uppercase",letterSpacing:2}}>Ripple Fridge Magnet</span></div>
          <div style={{background:`linear-gradient(180deg,${SL.grey[700]},${SL.grey[800]})`,borderRadius:16,padding:"20px 20px 24px",position:"relative",overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.1)",border:`3px solid ${bc}`,transition:"border-color 0.3s"}}>
            <div style={{textAlign:"center",marginBottom:6}}><span style={{fontSize:10,fontWeight:700,color:SL.grey[300],letterSpacing:1.5,textTransform:"uppercase"}}>{isY?"Yellow Bin Week":"Green Bin Week"}</span></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{display:"flex",flexDirection:"column",gap:16,paddingLeft:4}}>
                {["Full","Med","Low"].map((lv,i)=>{
                  const th=[80,50,20],act=gen.fillPct>=th[i],co=[SL.red[500],SL.yellow[500],SL.green[500]];
                  return(<div key={lv} style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:16,height:16,borderRadius:"50%",background:act?co[i]:SL.grey[700],boxShadow:act?`0 0 14px ${co[i]}`:"none",border:`2px solid ${act?co[i]:SL.grey[500]}`,transition:"all 0.5s"}}/>
                    <span style={{fontSize:14,fontWeight:700,color:act?SL.white:SL.grey[500]}}>{lv}</span>
                  </div>);
                })}
              </div>
              <div style={{flex:1,display:"flex",justifyContent:"center",marginTop:-10,marginBottom:-10}}>
                <BinnyIcon eyeColor={eyeC} size={140} isDead={binDown}/>
              </div>
            </div>
            {binDown&&(<div style={{background:`${SL.red[500]}22`,border:`1px solid ${SL.red[500]}`,borderRadius:10,padding:"8px 14px",marginTop:10,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
              <Icon name="alert-triangle" size={16} color={SL.red[500]}/>
              <span style={{fontSize:12,color:SL.red[500],fontWeight:700}}>BIN DOWN \u2014 DEAD CHOOK!</span>
            </div>)}
            <div style={{background:"rgba(255,255,255,0.06)",borderRadius:10,padding:14,marginTop:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:SL.grey[300]}}>General Waste</span>

              </div>
              <div style={{height:6,background:SL.grey[700],borderRadius:3,marginTop:8,overflow:"hidden"}}>

            </div>
            <div style={{textAlign:"center",padding:"12px 0 4px",marginTop:10,borderTop:`1px solid ${SL.grey[700]}`}}>

/* ═══ PAGES ═══ */

function HomePage({cashBalance,weekNumber,phase}){
  const last=weeklyData[weeklyData.length-1].fill,prev=weeklyData[weeklyData.length-2].fill;
  const trend=last<prev?"improving":last===prev?"stable":"attention";
  const tc={improving:{l:"Improving",icon:"arrow-down"},stable:{l:"Stable",icon:"minus"},attention:{l:"Needs Attention",icon:"arrow-up"}}[trend];
  const reductionPct=Math.round(((85-last)/85)*100);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:`linear-gradient(135deg,${SL.green[900]},${SL.green[700]})`,borderRadius:20,padding:24,color:SL.white}}>

          <div>
            <div style={{fontSize:14,opacity:0.8,marginBottom:4,fontFamily:"'Manrope',sans-serif"}}>Good morning, Len</div>
            <div style={{fontSize:22,fontWeight:800,lineHeight:1.2,fontFamily:"'Poppins',sans-serif"}}>Great Job!</div>
            <div style={{fontSize:13,opacity:0.85,marginTop:6,lineHeight:1.4}}>Track and manage your waste<br/>to help create a cleaner world.</div>
          </div>
          <CircularProgress value={reductionPct} max={25} size={90} strokeWidth={8} color={SL.green[300]}>
            <span style={{fontSize:22,fontWeight:800,color:SL.white}}>{reductionPct}%</span>
            <span style={{fontSize:9,color:"rgba(255,255,255,0.8)"}}>reduced</span>
          </CircularProgress>
        </div>
        <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
          <StatusPill label={"Week "+weekNumber} color={SL.white} bg="rgba(255,255,255,0.2)"/>
          <StatusPill label={phase} color={SL.green[300]} bg="rgba(255,255,255,0.15)"/>
          <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:20,background:"rgba(255,255,255,0.15)"}}>
            <Icon name={tc.icon} size={12} color={SL.white} strokeWidth={2.5}/>
            <span style={{fontSize:11,fontWeight:700,color:SL.white}}>{tc.l}</span>
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[
          {icon:"dollar-sign",iconBg:SL.green[100],iconC:SL.green[500],label:"Cash Balance",val:"$"+cashBalance,sub:"of $120.00",valC:SL.green[700]},
          {icon:"zap",iconBg:SL.orange[100],iconC:SL.orange[500],label:"At Risk",val:"$3.20",sub:"this week",valC:SL.orange[500]},
          {icon:"trending-down",iconBg:SL.teal[100],iconC:SL.teal[500],label:"Fill Rate",val:"58%",sub:"Target: 72%",valC:SL.teal[700],subC:SL.green[500]},
          {icon:"users",iconBg:SL.green[100],iconC:SL.green[500],label:"Neighbourhood",val:"Top 20%",sub:"vs your area",valC:SL.green[700]},
        ].map((s,i)=>(
          <Card key={i} style={{padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{width:32,height:32,borderRadius:8,background:s.iconBg,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name={s.icon} size={16} color={s.iconC}/></div>
              <span style={{fontSize:11,color:SL.grey[500],fontWeight:600}}>{s.label}</span>
            </div>
            <div style={{fontSize:26,fontWeight:800,color:s.valC}}>{s.val}</div>
            <div style={{fontSize:10,color:s.subC||SL.grey[500],marginTop:2}}>{s.sub}</div>
          </Card>
        ))}
      </div>
      <Card style={{background:`linear-gradient(135deg,${SL.green[50]},${SL.teal[100]})`,border:`1px solid ${SL.green[300]}`}}>
        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          <div style={{width:36,height:36,borderRadius:10,background:SL.green[500],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="leaf" size={18} color={SL.white}/></div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:SL.green[700],marginBottom:4}}>This Week's AI Tip</div>
            <div style={{fontSize:13,color:SL.grey[700],lineHeight:1.5}}>{tips[0].text}</div>
          </div>
        </div>
      </Card>
      <Card>
        <div style={{fontSize:14,fontWeight:700,color:SL.grey[900],marginBottom:16}}>Your Bins</div>
        <div style={{display:"flex",justifyContent:"space-around",alignItems:"flex-end"}}>
          {binTypes.map(b=>(
            <div key={b.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,flex:1}}>

              <div style={{fontSize:10,color:SL.grey[500]}}>{b.name}</div>
              <div style={{fontSize:10,color:SL.grey[400]}}>Next: {b.nextCollection}</div>

          ))}

      </Card>
      <Card style={{background:SL.yellow[100],border:`1px solid ${SL.yellow[500]}40`}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Icon name="wind" size={18} color={SL.yellow[500]}/>
          <div><div style={{fontSize:12,fontWeight:700,color:SL.grey[800]}}>Wind Warning \u2014 Tuesday</div><div style={{fontSize:11,color:SL.grey[600]}}>Gusts up to 45km/h. Secure your bins before collection.</div></div>
        </div>
      </Card>
    </div>
  );
}

        </div>
